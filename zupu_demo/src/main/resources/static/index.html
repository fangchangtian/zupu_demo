<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>族迹 · 电子族谱 Demo</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ====== Header ====== -->
<header class="header">
  <!-- 左侧：家族信息 -->
  <span class="info-badge" id="familyInfo">张氏宗谱 · 9代 · 48人</span>
  <nav>
    <button class="active" onclick="switchView('tree')">世系图谱</button>
    <button onclick="switchView('rules')">族规家训</button>
    <button onclick="switchView('logs')">操作日志</button>
  </nav>
  <!-- 右侧：登录用户 -->
  <div class="user-profile" id="headerUser" onclick="toggleUserPopover()">
    <div class="user-avatar" id="headerAvatar">图</div>
    <div class="user-info">
      <div class="user-name" id="headerUserName">加载中...</div>
      <div class="user-gen" id="headerUserGen"></div>
    </div>
  </div>
</header>

<!-- ====== Main Layout ====== -->
<div class="main" id="mainContent">

  <!-- Left: Member List -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h3>👥 家族成员</h3>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="搜索成员..." oninput="filterMembers(this.value)">
      </div>
    </div>
    <div class="member-list" id="memberList"></div>
  </aside>

  <!-- Center: Tree -->
  <div class="tree-panel" id="treePanel">
    <div class="tree-toolbar" id="treeToolbar">
      <span class="title">🌳 家族世系图</span>
      <span class="focus-badge" id="focusBadge" style="display:none"></span>
      <span class="sep" id="sep1" style="display:none">|</span>
      <button id="btnUp" onclick="switchToAncestor()" style="display:none">↑ 向上追溯</button>
      <button id="btnDown" onclick="switchToDescendant()" style="display:none">↓ 向下展开</button>
      <button id="btnFull" class="active" onclick="switchToFull()">🌳 全族</button>
      <span class="sep">|</span>
      <button onclick="treeOrient('TB')" id="btnTB" class="active">↓ 纵向</button>
      <button onclick="treeOrient('LR')" id="btnLR">→ 横向</button>
    </div>
    <div class="tree-container">
      <div class="chart" id="treeChart"></div>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="big-icon">🌱</div>
        <div>暂无家族数据，请先添加成员</div>
      </div>
    </div>
  </div>

  <!-- Right: Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h3>📋 成员详情</h3>
      <button class="close-btn" onclick="clearDetail()">✕</button>
    </div>
    <div class="detail-body" id="detailBody">
      <p style="color:var(--ink-light);text-align:center;padding:40px 0;">
        点击树图节点<br>或左侧列表查看成员详情
      </p>
    </div>
    <div class="detail-actions" id="detailActions" style="display:none">
      <button class="manage-toggle" id="manageToggle" onclick="toggleDetailManage()">⚙ 管理操作</button>
      <div class="action-btns">
        <button onclick="editMember()">✏️ 编辑</button>
        <button class="primary" onclick="openAddChildModal()">＋ 添加子女</button>
        <button class="spouse" onclick="openAddSpouseModal()">💍 添加配偶</button>
        <button class="danger" onclick="confirmDeleteMember()">🗑 删除</button>
      </div>
    </div>

    <!-- Relationship Query -->
    <div class="rel-section">
      <h4>🔗 关系查询</h4>
      <div class="rel-search-wrap">
        <div class="rel-search-row">
          <input type="text" id="relInputA" class="rel-input" placeholder="输入成员姓名..." autocomplete="off" onfocus="showRelDropdown('A')" oninput="filterRelDropdown('A')" onblur="hideRelDropdown('A', event)">
          <input type="hidden" id="relPersonA" value="">
        </div>
        <div class="rel-search-row">
          <input type="text" id="relInputB" class="rel-input" placeholder="输入成员姓名..." autocomplete="off" onfocus="showRelDropdown('B')" oninput="filterRelDropdown('B')" onblur="hideRelDropdown('B', event)">
          <input type="hidden" id="relPersonB" value="">
        </div>
        <div class="rel-dropdown" id="relDropdownA"></div>
        <div class="rel-dropdown" id="relDropdownB"></div>
      </div>
      <button class="query-btn" onclick="calculateRelation()">查询两人关系</button>
      <div class="rel-result" id="relResult"></div>
    </div>
  </div>
</div>

<!-- ====== Add/Edit Modal ====== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">添加成员</h3>
      <button style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink-light)" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- 头像上传 -->
      <div class="avatar-upload">
        <div class="preview" id="formAvatarPreview">图</div>
        <div class="uploader-info">
          <div class="title">头像</div>
          <div class="hint">点击右侧按钮上传本地图片<br>支持 JPG/PNG，建议正方形</div>
        </div>
        <div class="uploader-btns">
          <button type="button" class="upload-btn" onclick="document.getElementById('formAvatarFile').click()">📷 上传图片</button>
          <button type="button" class="upload-btn danger" id="formAvatarReset" onclick="resetAvatar()" style="display:none">↺ 移除头像</button>
          <input type="file" id="formAvatarFile" accept="image/*" onchange="handleAvatarUpload(event)">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>姓名 *</label>
          <input type="text" id="formName" placeholder="成员姓名">
        </div>
        <div class="form-group">
          <label>性别 *</label>
          <select id="formGender">
            <option value="M">男</option>
            <option value="F">女</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>字辈名</label>
        <input type="text" id="formGenName" placeholder="如：泽、明 等字辈">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>出生日期</label>
          <input type="date" id="formBirth">
        </div>
        <div class="form-group">
          <label>是否在世</label>
          <select id="formAlive">
            <option value="1">在世</option>
            <option value="0">已故</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>逝世日期</label>
        <input type="date" id="formDeath">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>父亲</label>
          <div class="searchable-select" id="fatherSelect">
            <input type="text" id="formFather" placeholder="搜索姓名..." autocomplete="off"
              onfocus="showSearchDropdown('fatherSelect', 'M', 'formFatherHidden')"
              oninput="filterSearchDropdown('fatherSelect', this.value, 'M', 'formFatherHidden')">
            <button type="button" class="ss-clear" onclick="clearSearchSelect('fatherSelect', 'formFather', 'formFatherHidden')">✕</button>
            <div class="ss-dropdown" id="fatherSelectDropdown"></div>
            <input type="hidden" id="formFatherHidden" value="">
          </div>
        </div>
        <div class="form-group">
          <label>母亲</label>
          <div class="searchable-select" id="motherSelect">
            <input type="text" id="formMother" placeholder="搜索姓名..." autocomplete="off"
              onfocus="showSearchDropdown('motherSelect', 'F', 'formMotherHidden')"
              oninput="filterSearchDropdown('motherSelect', this.value, 'F', 'formMotherHidden')">
            <button type="button" class="ss-clear" onclick="clearSearchSelect('motherSelect', 'formMother', 'formMotherHidden')">✕</button>
            <div class="ss-dropdown" id="motherSelectDropdown"></div>
            <input type="hidden" id="formMotherHidden" value="">
          </div>
        </div>
      </div>
      <!-- 子女编辑区域 -->
      <div class="children-editor" id="childrenEditor">
        <div class="ce-label">子女</div>
        <div class="ce-list" id="ceList"></div>
        <div class="searchable-select ce-search" id="childSelect">
          <input type="text" id="ceSearchInput" placeholder="搜索子女姓名添加..." autocomplete="off"
            onfocus="showChildDropdown()"
            oninput="filterChildDropdown(this.value)">
          <button type="button" class="ss-clear" onclick="clearChildSearch()">✕</button>
          <div class="ss-dropdown" id="childDropdown"></div>
        </div>
      </div>
      <div class="form-group">
        <label>出生地</label>
        <input type="text" id="formBirthplace" placeholder="如：浙江绍兴">
      </div>
      <div class="form-group">
        <label>生平简介</label>
        <textarea id="formBio" placeholder="简要描述该成员的生平..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="cancel" onclick="closeModal()">取消</button>
      <button class="confirm" id="modalConfirm" onclick="saveMember()">确认添加</button>
    </div>
  </div>
</div>

<!-- ====== Delete Confirm Dialog ====== -->
<div class="del-overlay" id="delOverlay">
  <div class="del-dialog">
    <h4>⚠️ 确认删除</h4>
    <p>即将删除成员：<strong id="delName"></strong></p>
    <p class="del-warn" id="delWarn"></p>
    <div class="del-btns">
      <button onclick="closeDelDialog()">取消</button>
      <button class="del-confirm" id="delConfirmBtn" onclick="executeDelete()">确认删除</button>
    </div>
  </div>
</div>

<!-- ====== Member Profile Dialog ====== -->
<div class="profile-overlay" id="profileOverlay" onclick="if(event.target===this)closeProfileDialog()">
  <div class="profile-dialog">
    <div class="profile-header">
      <button class="profile-close" onclick="closeProfileDialog()">✕</button>
      <div class="profile-avatar" id="profileAvatar"></div>
      <div>
        <div class="profile-name" id="profileName"></div>
        <div class="profile-sub" id="profileSub"></div>
      </div>
    </div>
    <div class="profile-body" id="profileBody"></div>
  </div>
</div>


<!-- ====== User Profile Popover ====== -->
<div class="user-popover-overlay" id="userPopoverOverlay" onclick="closeUserPopover()"></div>
<div class="user-popover" id="userPopover" style="display:none">
  <div class="popover-header">
    <div class="popover-avatar" id="popoverAvatar">图</div>
    <div>
      <div class="popover-name" id="popoverName">姓名</div>
      <div class="popover-gen" id="popoverGen"></div>
    </div>
  </div>
  <div class="popover-body" id="popoverBody">
    <div class="popover-field"><span class="label">性别</span><span class="value" id="popoverGender"></span></div>
    <div class="popover-field"><span class="label">生辰</span><span class="value" id="popoverBirth"></span></div>
    <div class="popover-field"><span class="label">配偶</span><span class="value" id="popoverSpouse"></span></div>
    <div class="popover-field"><span class="label">子女</span><span class="value" id="popoverChildren"></span></div>
  </div>
  <div class="popover-actions">
    <button onclick="editCurrentUser()">✏️ 编辑</button>
    <button class="primary" onclick="addChildForCurrentUser()">＋ 添加子女</button>
    <button class="spouse" onclick="addSpouseForCurrentUser()">💍 添加配偶</button>
    <button class="logout" onclick="logout()">🚪 退出登录</button>
  </div>
</div>
  <script src="js/data.js"></script>
  <script src="js/tree-engine.js"></script>
  <script src="js/relation.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
